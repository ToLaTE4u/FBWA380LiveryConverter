name: Build release exe

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv and Python 3.12
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build executable
        run: powershell -ExecutionPolicy Bypass -File scripts/build_exe.ps1

      - name: Smoke-test the executable
        run: ./dist/A380XLiveryConverter.exe convert --help

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: A380XLiveryConverter
          path: dist/A380XLiveryConverter.exe
          if-no-files-found: error

      - name: Extract changelog for tag
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          BODY=$(awk "/^## ${TAG//./\\.}/{found=1; next} /^## /{found=0} found" CHANGELOG.md)
          echo "body<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/A380XLiveryConverter.exe
          body: ${{ steps.changelog.outputs.body }}
          fail_on_unmatched_files: true
